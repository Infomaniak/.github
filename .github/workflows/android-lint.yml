name: Android lint

on: workflow_call

jobs:
  lint:
    runs-on: [ self-hosted, Android ]

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.3
        with:
          token: ${{ github.token }}
          submodules: recursive

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lint
