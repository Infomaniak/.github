name: Android Lint

on: workflow_call

permissions:
  contents: read

jobs:
  lint:
    runs-on: [ self-hosted, Android ]

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.3
        with:
          token: ${{ github.token }}
          submodules: recursive

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic

      - name: Run lint
        run: ./gradlew lint
