name: Commit tree link
description: >
  Builds a Markdown link (and short SHA) pointing to the repository tree at a
  given commit, for use in notifications (e.g. KChat release/snapshot messages).

inputs:
  sha:
    description: 'Commit SHA to link to (defaults to the triggering commit, github.sha)'
    required: false
    default: ${{ github.sha }}
  repository:
    description: 'owner/repo to link to (defaults to the current repository)'
    required: false
    default: ${{ github.repository }}

outputs:
  short-sha:
    description: 'First 7 characters of the commit SHA'
    value: ${{ steps.build.outputs.short-sha }}
  url:
    description: 'URL to the repository tree at the given commit'
    value: ${{ steps.build.outputs.url }}
  markdown-link:
    description: 'Ready-to-use Markdown link, e.g. [abc1234](https://github.com/owner/repo/tree/sha)'
    value: ${{ steps.build.outputs.markdown-link }}

runs:
  using: composite
  steps:
    - id: build
      shell: bash
      run: |
        SHA="${{ inputs.sha }}"
        SHORT_SHA="${SHA:0:7}"
        URL="https://github.com/${{ inputs.repository }}/tree/$SHA"
        echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
        echo "url=$URL" >> "$GITHUB_OUTPUT"
        echo "markdown-link=[$SHORT_SHA]($URL)" >> "$GITHUB_OUTPUT"
